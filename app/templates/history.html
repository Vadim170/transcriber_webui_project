<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История — Dual Transcriber</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>История интервалов</h1>
        <p class="muted">Просмотр транскрибированных интервалов за произвольный период</p>
      </div>
      <div class="top-actions">
        <a href="/" class="ghost-link">← Мониторинг</a>
        <button id="logout-btn" class="ghost">Выйти</button>
      </div>
    </header>

    <!-- Timeline chart -->
    <section class="panel history-overview-panel">
      <div class="panel-header row-between">
        <h2>Таймлайн интервалов</h2>
        <div class="legend-row">
          <span class="legend-dot" style="background:#7c9cff"></span><span class="muted">транскрибировано</span>
          <span class="legend-dot" style="background:#f1c40f"></span><span class="muted">запись</span>
        </div>
      </div>
      <div id="timeline-chart" class="overview-chart">
        <div class="muted" style="text-align:center;padding:40px 0">Загрузка…</div>
      </div>
      <div class="overview-hint muted">Перетащите по таймлайну для выбора диапазона · Нажмите на интервал для просмотра</div>
    </section>

    <!-- Range controls -->
    <section class="panel history-controls-panel">
      <h2>Диапазон</h2>
      <div class="range-controls">
        <div class="range-inputs">
          <div>
            <label>От</label>
            <input type="datetime-local" id="range-from" step="1">
          </div>
          <div class="range-sep muted">—</div>
          <div>
            <label>До</label>
            <input type="datetime-local" id="range-to" step="1">
          </div>
        </div>
        <div class="preset-row">
          <button class="ghost preset-btn" data-preset="5m">5 мин</button>
          <button class="ghost preset-btn" data-preset="15m">15 мин</button>
          <button class="ghost preset-btn" data-preset="1h">1 час</button>
          <button class="ghost preset-btn" data-preset="4h">4 часа</button>
          <button class="ghost preset-btn" data-preset="today">Сегодня</button>
          <button class="ghost preset-btn" data-preset="yesterday">Вчера</button>
        </div>
        <div class="load-row">
          <button id="load-btn">Загрузить</button>
          <span id="range-status" class="muted"></span>
        </div>
      </div>
    </section>

    <!-- Results -->
    <section class="panel history-results-panel" id="results-panel" style="display:none">
      <div class="panel-header row-between">
        <h2>Результаты <span id="results-count" class="muted"></span></h2>
        <button id="copy-text-btn" class="ghost">Скопировать текст</button>
      </div>
      <div id="results-list" class="history-results-list"></div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='history.js') }}"></script>
</body>
</html>
